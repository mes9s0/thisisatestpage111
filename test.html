<!DOCTYPE html>
<html>
<head>
    <title>JSBridge Test</title>
    <script>
        function JS2NativeBridgeObject(){
            alert("Window 对象:", Object.keys(window.JS2NativeBridge));
        }



        ToutiaoJSBridge._handleMessageFromToutiao = function(message){
            alert(JSON.stringify(message))
        };

        // 按钮点击事件处理函数
        function callUserInfoAndroidJSBridge() {
            window.ToutiaoJSBridge.invokeMethod(JSON.stringify({
                "func": "app.getUserInfo",
                "params": {},
                "JSSDK": "2.2.9",
                "__msg_type": "call",
                "__callback_id": "1024"
            }));
        }



        function callUserInfoIOSJSBridge(){
            window.JS2NativeBridge.invokeMethod(JSON.stringify({
                "func":"app.getUserInfo",
                "__msg_type":"callback",
                "params":{},
                "JSSDK":"1",
                "__msg_type": "call",
                "__callback_id": "1024"
            }));
        }


        function callfetchIOSJSBridge(){
            window.JS2NativeBridge.invokeMethod(
                            JSON.stringify(
                                {
                                    "__callback_id":"0",
                                    "func":"app.fetch",
                                    "__msg_type":"callback",
                                    "params":{
                                        "url":"https://www.baidu.com",
                                        "method":"GET"
                                    },
                                    "JSSDK":"1",
                                    "namespace":"host",
                                    "__iframe_url":""
                                }   
                            )
                        );
        }



    </script>
</head>
<body>
    <h1>JSBridge调用测试页面</h1>
    <button onclick="callUserInfoJSBridge()">点击调用AndroidUserInfo</button>
    <button onclick="callUserInfoIOSJSBridge()">点击调用IOSUserInfo</button>
    <button onclick="JS2NativeBridgeObject()">点击查看JS2NativeBridge对象</button>
    <button onclick="callfetchIOSJSBridge()">点击查看fetch流量</button>

</body>
</html>
